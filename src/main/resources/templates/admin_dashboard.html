<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <!-- Add Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	
	 <h2 class="text-center">Admin Dashboard</h2>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Courses</h2>
            <form class="d-flex" th:action="@{/courses/search}" method="get">
                <input class="form-control me-2" type="search" name="keyword" placeholder="Search by title" required>
                <button class="btn btn-outline-primary" type="submit">Search</button>
            </form>
            <a href="/courses/add" class="btn btn-primary ms-2">Add New Course</a>
        </div>
        <!-- Table to display courses -->
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Credits</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="course : ${courses}">
                    <td th:text="${course.title}"></td>
                    <td th:text="${course.description}"></td>
                    <td th:text="${course.credits}"></td>
                    <td>
                        <!-- Edit and Delete buttons -->
                        <a href="#" class="btn btn-warning btn-sm" th:href="@{/courses/edit/{id}(id=${course.id})}">Edit</a>
                        <a href="#" class="btn btn-danger btn-sm" th:href="@{/courses/delete/{id}(id=${course.id})}" 
                           onclick="return confirm('Are you sure you want to delete this course?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
